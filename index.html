<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Eleitoral Avançado - Piauí</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            height: 100vh;
            background: #f0f2f5;
        }

        #map {
            flex: 2;
            height: 100%;
            z-index: 1;
        }

        #sidebar {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            background: #ffffff;
            padding: 25px;
            box-sizing: border-box;
            border-left: 1px solid #e0e0e0;
            box-shadow: -2px 0 8px rgba(0, 0, 0, 0.05);
        }

        h3 {
            color: #1e3d59;
            margin-top: 0;
            border-bottom: 2px solid #1e3d59;
            padding-bottom: 10px;
        }

        h4 {
            color: #17b978;
            margin-bottom: 5px;
        }

        .grid-filtros {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .filtro-item {
            display: flex;
            flex-direction: column;
        }

        .filtro-item.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 12px;
            font-weight: bold;
            color: #666;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        select {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: #1e3d59;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        th, td {
            padding: 10px 12px;
            border: 1px solid #eee;
            text-align: left;
            font-size: 13px;
        }

        th {
            background-color: #1e3d59;
            color: white;
            font-weight: 600;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        .total-box {
            background: #e8f4f8;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 10px;
            color: #1e3d59;
            border-left: 4px solid #1e3d59;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <div id="sidebar">
        <h3>Filtros de Pesquisa</h3>

        <div class="grid-filtros">
            <div class="filtro-item">
                <label for="f-ano">Ano</label>
                <select id="f-ano"><option value="TODOS">Todos</option></select>
            </div>
            <div class="filtro-item">
                <label for="f-municipio">Município</label>
                <select id="f-municipio"><option value="TODOS">Todos</option></select>
            </div>
            <div class="filtro-item">
                <label for="f-zona">Zona</label>
                <select id="f-zona"><option value="TODOS">Todas</option></select>
            </div>
            <div class="filtro-item">
                <label for="f-bairro">Bairro</label>
                <select id="f-bairro"><option value="TODOS">Todos</option></select>
            </div>
            <div class="filtro-item">
                <label for="f-cargo">Cargo</label>
                <select id="f-cargo"><option value="TODOS">Todos</option></select>
            </div>
            <div class="filtro-item">
                <label for="f-secao">Seção</label>
                <select id="f-secao"><option value="TODOS">Todas</option></select>
            </div>
            <div class="filtro-item full-width">
                <label for="f-candidato">Candidato</label>
                <select id="f-candidato"><option value="TODOS">Todos os Candidatos</option></select>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <div id="painel-resultados">
            <p style="color: #777;">Clique em um local no mapa ou altere os filtros para ver os resultados detalhados.</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-5.0920, -42.8034], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let dadosGerais = [];
        let marcadoresGrupo = L.layerGroup().addTo(map);
        let localSelecionadoNoMapa = null;

        const fAno = document.getElementById('f-ano');
        const fMunicipio = document.getElementById('f-municipio');
        const fZona = document.getElementById('f-zona');
        const fBairro = document.getElementById('f-bairro');
        const fCargo = document.getElementById('f-cargo');
        const fSecao = document.getElementById('f-secao');
        const fCandidato = document.getElementById('f-candidato');

        // Carrega o novo JSON ultra-compactado de uma vez só
        fetch('dados_votos_ultra.json?v=' + Date.now())
            .then(response => response.json())
            .then(data => {
                dadosGerais = data;
                console.log("Dados carregados com sucesso.");
                populaFiltrosIniciais();
                atualizarMapaEDetalhes();
            })
            .catch(err => console.error("Erro ao carregar JSON:", err));

        function populaFiltrosIniciais() {
            let anos = new Set();
            let municipios = new Set();
            let cargos = new Set();

            dadosGerais.forEach(local => {
                if (local.m) municipios.add(local.m);

                let secoes = local.s || [];
                secoes.forEach(sec => {
                    let votos = sec.v || [];
                    votos.forEach(v => {
                        if (v[0]) anos.add(v[0]); // v[0] = ano
                        if (v[1]) cargos.add(v[1]); // v[1] = cargo
                    });
                });
            });

            // Correção de duplicação: reinicia os selects estruturais antes de popular
            fAno.innerHTML = '<option value="TODOS">Todos</option>';
            Array.from(anos).sort((a, b) => b - a).forEach(ano => fAno.innerHTML += `<option value="${ano}">${ano}</option>`);
            
            fMunicipio.innerHTML = '<option value="TODOS">Todos</option>';
            Array.from(municipios).sort().forEach(mun => fMunicipio.innerHTML += `<option value="${mun}">${mun}</option>`);
            
            fCargo.innerHTML = '<option value="TODOS">Todos</option>';
            Array.from(cargos).sort().forEach(car => fCargo.innerHTML += `<option value="${car}">${car}</option>`);
        }

        fMunicipio.onchange = () => {
            localSelecionadoNoMapa = null;
            const munSelecionado = fMunicipio.value;

            let zonas = new Set();
            let bairros = new Set();

            dadosGerais.forEach(local => {
                if (munSelecionado === "TODOS" || local.m === munSelecionado) {
                    if (local.z) zonas.add(local.z);
                    if (local.b) bairros.add(local.b);
                }
            });

            fZona.innerHTML = '<option value="TODOS">Todas</option>';
            Array.from(zonas).sort().forEach(z => fZona.innerHTML += `<option value="${z}">Zona ${z}</option>`);

            fBairro.innerHTML = '<option value="TODOS">Todos</option>';
            Array.from(bairros).sort().forEach(b => fBairro.innerHTML += `<option value="${b}">${b}</option>`);

            fSecao.innerHTML = '<option value="TODOS">Todas</option>';

            atualizarFiltroCandidatos();
        };

        fCargo.onchange = atualizarFiltroCandidatos;
        fAno.onchange = atualizarFiltroCandidatos;
        fZona.onchange = atualizarFiltroSecoes;
        fBairro.onchange = () => { atualizarFiltroSecoes(); };

        function atualizarFiltroSecoes() {
            const munSelecionado = fMunicipio.value;
            const zonaSelecionada = fZona.value;
            const bairroSelecionado = fBairro.value;
            let secoesSet = new Set();

            dadosGerais.forEach(local => {
                if ((munSelecionado === "TODOS" || local.m === munSelecionado) &&
                    (zonaSelecionada === "TODOS" || local.z == zonaSelecionada) &&
                    (bairroSelecionado === "TODOS" || local.b === bairroSelecionado)) {

                    let secoes = local.s || [];
                    secoes.forEach(sec => {
                        if (sec.sec) secoesSet.add(sec.sec);
                    });
                }
            });

            fSecao.innerHTML = '<option value="TODOS">Todas</option>';
            Array.from(secoesSet).sort((a, b) => parseInt(a) - parseInt(b)).forEach(s => fSecao.innerHTML += `<option value="${s}">Seção ${s}</option>`);

            atualizarMapaEDetalhes();
        }

        function atualizarFiltroCandidatos() {
            const anoSelecionado = fAno.value;
            const cargoSelecionado = fCargo.value;
            const munSelecionado = fMunicipio.value;
            let candidatos = new Set();

            dadosGerais.forEach(local => {
                if (munSelecionado === "TODOS" || local.m === munSelecionado) {
                    let secoes = local.s || [];
                    secoes.forEach(sec => {
                        let votos = sec.v || [];
                        votos.forEach(v => {
                            if ((anoSelecionado === "TODOS" || v[0] == anoSelecionado) &&
                                (cargoSelecionado === "TODOS" || v[1] === cargoSelecionado)) {
                                if (v[2]) candidatos.add(v[2]); // v[2] = candidato
                            }
                        });
                    });
                }
            });

            fCandidato.innerHTML = '<option value="TODOS">Todos os Candidatos</option>';
            Array.from(candidatos).sort().forEach(cand => fCandidato.innerHTML += `<option value="${cand}">${cand}</option>`);

            atualizarMapaEDetalhes();
        }

        fSecao.onchange = atualizarMapaEDetalhes;
        fCandidato.onchange = atualizarMapaEDetalhes;

        function atualizarMapaEDetalhes() {
            marcadoresGrupo.clearLayers();

            const filtro = {
                ano: fAno.value,
                municipio: fMunicipio.value,
                zona: fZona.value,
                bairro: fBairro.value,
                cargo: fCargo.value,
                secao: fSecao.value,
                candidato: fCandidato.value
            };

            const nenhumFiltroAtivo = (
                filtro.ano === "TODOS" && filtro.municipio === "TODOS" &&
                filtro.zona === "TODOS" && filtro.bairro === "TODOS" &&
                filtro.cargo === "TODOS" && filtro.secao === "TODOS" &&
                filtro.candidato === "TODOS"
            );

            if (nenhumFiltroAtivo) {
                const painel = document.getElementById('painel-resultados');
                painel.innerHTML = `
                    <div style="text-align: center; margin-top: 30px; padding: 15px; border: 1px dashed #ccc; border-radius: 6px; background: #fafafa;">
                        <span style="font-size: 24px;">🔍</span>
                        <p style="color: #555; font-size: 14px; margin-top: 10px;">
                            <b>Nenhum filtro selecionado.</b><br>
                            Selecione pelo menos um Ano, Município ou Cargo para renderizar os marcadores de forma fluida.
                        </p>
                    </div>
                `;
                map.setView([-5.0920, -42.8034], 7);
                return;
            }

            let tabelaConsolidadaGlobal = {};
            let totalVotosFiltro = 0;
            let primeiroPontoValido = null;

            dadosGerais.forEach(local => {
                if (filtro.municipio !== "TODOS" && local.m !== filtro.municipio) return;
                if (filtro.zona !== "TODOS" && local.z != filtro.zona) return;
                if (filtro.bairro !== "TODOS" && local.b !== filtro.bairro) return;

                let localTemVotoValido = false;
                let tabelaLocal = {};

                let secoes = local.s || [];
                secoes.forEach(sec => {
                    if (filtro.secao !== "TODOS" && sec.sec != filtro.secao) return;

                    let votos = sec.v || [];
                    votos.forEach(v => {
                        if (filtro.ano !== "TODOS" && v[0] != filtro.ano) return;
                        if (filtro.cargo !== "TODOS" && v[1] !== filtro.cargo) return;
                        if (filtro.candidato !== "TODOS" && v[2] !== filtro.candidato) return;

                        localTemVotoValido = true;
                        let chave = `${v[0]}|${v[1]}|${v[2]}`;
                        
                        tabelaLocal[chave] = (tabelaLocal[chave] || 0) + parseInt(v[3]);
                        tabelaConsolidadaGlobal[chave] = (tabelaConsolidadaGlobal[chave] || 0) + parseInt(v[3]);
                        totalVotosFiltro += parseInt(v[3]);
                    });
                });

                if (localTemVotoValido && local.lat && local.lng) {
                    let latitudeNum = floatGarantido(local.lat);
                    let longitudeNum = floatGarantido(local.lng);

                    if (!primeiroPontoValido) primeiroPontoValido = [latitudeNum, longitudeNum];

                    const marker = L.marker([latitudeNum, longitudeNum]).addTo(marcadoresGrupo);
                    marker.bindPopup(`<b>${local.n}</b><br>${local.b || ''} - ${local.m}`);
                    
                    marker.on('click', () => {
                        localSelecionadoNoMapa = local;
                        renderizarPainelLateral(tabelaLocal, local.n);
                    });
                }
            });

            if (filtro.municipio !== "TODOS" && primeiroPontoValido && !localSelecionadoNoMapa) {
                map.setView(primeiroPontoValido, 12);
            } else if (primeiroPontoValido && !localSelecionadoNoMapa) {
                map.setView(primeiroPontoValido, 8);
            }

            if (!localSelecionadoNoMapa) {
                renderizarPainelLateral(tabelaConsolidadaGlobal, "Resultado Acumulado do Filtro", totalVotosFiltro);
            } else {
                recalcularVotosLocalAtivo(filtro);
            }
        }

        function recalcularVotosLocalAtivo(filtro) {
            let tabelaLocal = {};
            let total = 0;

            let secoes = localSelecionadoNoMapa.s || [];
            let nome = localSelecionadoNoMapa.n;

            secoes.forEach(sec => {
                if (filtro.secao !== "TODOS" && sec.sec != filtro.secao) return;

                let votos = sec.v || [];
                votos.forEach(v => {
                    if (filtro.ano !== "TODOS" && v[0] != filtro.ano) return;
                    if (filtro.cargo !== "TODOS" && v[1] !== filtro.cargo) return;
                    if (filtro.candidato !== "TODOS" && v[2] !== filtro.candidato) return;

                    let chave = `${v[0]}|${v[1]}|${v[2]}`;
                    tabelaLocal[chave] = (tabelaLocal[chave] || 0) + parseInt(v[3]);
                    total += parseInt(v[3]);
                });
            });
            renderizarPainelLateral(tabelaLocal, nome, total);
        }

        function renderizarPainelLateral(tabelaDados, titulo, totalGeral = null) {
            const painel = document.getElementById('painel-resultados');

            let listaOrdenada = Object.keys(tabelaDados).map(chave => {
                let [ano, cargo, candidato] = chave.split('|');
                return { ano, cargo, candidato, qtd: tabelaDados[chave] };
            }).sort((a, b) => b.qtd - a.qtd);

            if (listaOrdenada.length === 0) {
                painel.innerHTML = `<h4>${titulo}</h4><p style="color:red;">Nenhum voto registrado para os filtros selecionados.</p>`;
                return;
            }

            let html = `<h4>${titulo}</h4>`;
            if (totalGeral !== null) {
                html += `<div class="total-box"><b>Total de votos válidos na seleção:</b> ${totalGeral}</div>`;
            }
            if (localSelecionadoNoMapa) {
                html += `<button onclick="resetarFocoLocal()" style="margin-top:8px; padding:4px 8px; cursor:pointer; font-size:11px;">Limpar Seleção de Ponto</button>`;
            }

            html += `<table>
                        <thead>
                            <tr>
                                <th>Ano</th>
                                <th>Cargo</th>
                                <th>Candidato</th>
                                <th>Votos</th>
                            </tr>
                        </thead>
                        <tbody>`;

            listaOrdenada.forEach(item => {
                html += `<tr>
                            <td>${item.ano}</td>
                            <td>${item.cargo}</td>
                            <td>${item.candidato}</td>
                            <td><b>${item.qtd}</b></td>
                         </tr>`;
            });

            html += `</tbody></table>`;
            painel.innerHTML = html;
        }

        function resetarFocoLocal() {
            localSelecionadoNoMapa = null;
            atualizarMapaEDetalhes();
        }

        function floatGarantido(num) {
            if (typeof num === 'string') num = num.replace(',', '.');
            return parseFloat(num);
        }
    </script>
</body>

</html>
